<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartWatch ASX Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    table { border-collapse: collapse; }
    th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; }
    th { background-color: #f3f4f6; }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800">📊 ChartWatch ASX Tracker</h1>
      <button onclick="runScrape()" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
        <i class="fas fa-sync"></i> Run Scan Now
      </button>
    </div>
    
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Latest Scans</h2>
      <div id="results" class="overflow-x-auto"></div>
    </div>
    
    <div class="mt-6 text-sm text-gray-500">
      Deployed on Render • Runs automatically at 9:15 AEST daily
    </div>
  </div>

  <script>
    async function loadScans() {
      try {
        const res = await fetch('/scans');
        const data = await res.json();
        let html = `<table class="w-full"><thead><tr>
          <th>Date</th><th>Code</th><th>Company</th><th>Type</th><th>Price</th><th>1mo %</th><th>Strong Demand</th><th>Strong Supply</th>
        </tr></thead><tbody>`;
        
        data.slice(0, 50).forEach(item => {
          html += `<tr>
            <td>${item.scan_date}</td>
            <td><strong>${item.code}</strong></td>
            <td>${item.company}</td>
            <td>${item.trend_type}</td>
            <td>$${item.last_price || '-'}</td>
            <td>${item.mo_change ? item.mo_change.toFixed(1) : '-'}%</td>
            <td>${item.is_strong_demand ? '✅' : ''}</td>
            <td>${item.is_strong_supply ? '✅' : ''}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('results').innerHTML = html;
      } catch(e) {
        document.getElementById('results').innerHTML = '<p class="text-red-500">Failed to load data. Make sure backend is running.</p>';
      }
    }

    async function runScrape() {
      const btn = event.target;
      btn.innerHTML = 'Running...';
      btn.disabled = true;
      
      try {
        const res = await fetch('/run-scrape', { method: 'POST' });
        const data = await res.json();
        alert(JSON.stringify(data, null, 2));
        loadScans();
      } catch(e) {
        alert('Error running scrape');
      }
      
      btn.innerHTML = '<i class="fas fa-sync"></i> Run Scan Now';
      btn.disabled = false;
    }

    // Load on page open
    window.onload = loadScans;
  </script>
</body>
</html>
